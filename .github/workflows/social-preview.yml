- name: Fetch GitHub Open Graph preview
        run: |
          REPO_OWNER="tanazd2"
          REPO_NAME="termux-utils"
          PREVIEW_URL="https://opengraph.githubassets.com/1/${REPO_OWNER}/${REPO_NAME}"
          mkdir -p .github
          curl -fL --retry 3 "$PREVIEW_URL" -o .github/social-preview.png || echo "Failed to download social preview, skipping"
