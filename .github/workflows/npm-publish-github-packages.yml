name: Node.js Package with C/C++ Build

on:
  release:
    types: [created]

jobs:
  # Call the reusable C/C++ workflow
  build-cpp:
    uses: ./.github/workflows/c-cpp.yml
    with:
      build_type: Release

  # Node.js build & test
  build-node:
    runs-on: ubuntu-latest
    needs: build-cpp
    steps:
      - uses: actions/checkout@v4          # Only need to checkout once per job
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  # Node.js publish to GitHub Packages
  publish-gpr:
    runs-on: ubuntu-latest
    needs: build-node
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
